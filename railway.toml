# ─── Railway deploy config — monorepo con npm workspaces ──────────────────────
# La fase de install la define nixpacks.toml (npm install --include=dev desde
# la raíz, que instala TODOS los workspaces — web + api — con sus devDeps).
# Aquí solo definimos build (compilar el frontend) y start (arrancar la API que
# sirve apps/web/dist en producción).

[build]
builder = "nixpacks"
buildCommand = "npm run build"
watchPatterns = ["/apps/**", "/*.toml", "/*.json"]

[deploy]
startCommand = "npm run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[healthcheck]
path = "/health"
timeout = 30
