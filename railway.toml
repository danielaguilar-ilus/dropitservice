[build]
builder = "nixpacks"
# --include=dev forces vite + plugins (devDependencies) to install even when
# NODE_ENV=production is set in Railway. Without it, `vite build` returns
# exit code 127 (command not found).
buildCommand = "cd apps/web && npm install --include=dev && npm run build && cd ../api && npm install --omit=dev"

[deploy]
startCommand = "cd apps/api && node src/server.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[healthcheck]
path = "/health"
timeout = 30
