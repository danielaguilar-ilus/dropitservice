name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: dropit-service
  REGION:       southamerica-west1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --source . \
            --region $REGION \
            --project $PROJECT_ID \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --set-build-env-vars "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}" \
            --set-env-vars "\
          NODE_ENV=production,\
          DATA_DIR=/tmp,\
          PUBLIC_URL=https://dropitservice.cl,\
          DATABASE_URL=${{ secrets.DATABASE_URL }},\
          ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }},\
          RESET_ADMIN_PW=${{ secrets.RESET_ADMIN_PW }},\
          GMAIL_USER=${{ secrets.GMAIL_USER }},\
          GMAIL_CLIENT_ID=${{ secrets.GMAIL_CLIENT_ID }},\
          GMAIL_CLIENT_SECRET=${{ secrets.GMAIL_CLIENT_SECRET }},\
          GMAIL_REFRESH_TOKEN=${{ secrets.GMAIL_REFRESH_TOKEN }},\
          SMTP_USER=${{ secrets.SMTP_USER }},\
          SMTP_PASS=${{ secrets.SMTP_PASS }},\
          SMTP_FROM=DropIt Service,\
          GCS_BUCKET=dropit-fotos,\
          GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}"
